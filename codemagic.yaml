workflows:
  ios-release:
    name: iOS Release Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Bjorkhagen Admin
    environment:
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        APP_STORE_CONNECT_APP_ID: "6758961616"
        BUNDLE_ID: "com.zemichat.app"
      node: 22
    scripts:
      - name: Install dependencies
        script: |
          npm ci --legacy-peer-deps
      - name: Build web assets
        script: |
          npm run build
      - name: Sync iOS platform
        script: |
          npx cap add ios || true
          npx cap sync ios
      - name: Patch iOS Info.plist
        script: |
          # Add required privacy usage descriptions
          PLIST="ios/App/App/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryUsageDescription string 'ZemiChat behöver åtkomst till ditt fotobibliotek för att skicka bilder i chattar'" "$PLIST" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Set :NSPhotoLibraryUsageDescription 'ZemiChat behöver åtkomst till ditt fotobibliotek för att skicka bilder i chattar'" "$PLIST"

          /usr/libexec/PlistBuddy -c "Add :NSLocationWhenInUseUsageDescription string 'ZemiChat behöver din plats för att dela den med vänner i chattar'" "$PLIST" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Set :NSLocationWhenInUseUsageDescription 'ZemiChat behöver din plats för att dela den med vänner i chattar'" "$PLIST"

          /usr/libexec/PlistBuddy -c "Add :NSLocationAlwaysAndWhenInUseUsageDescription string 'ZemiChat behöver din plats för att dela den med vänner i chattar'" "$PLIST" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Set :NSLocationAlwaysAndWhenInUseUsageDescription 'ZemiChat behöver din plats för att dela den med vänner i chattar'" "$PLIST"

          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryAddUsageDescription string 'ZemiChat behöver åtkomst för att spara bilder från chattar'" "$PLIST" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Set :NSPhotoLibraryAddUsageDescription 'ZemiChat behöver åtkomst för att spara bilder från chattar'" "$PLIST"

          /usr/libexec/PlistBuddy -c "Add :NSCameraUsageDescription string 'ZemiChat behöver kameran för att ta bilder och videosamtal'" "$PLIST" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Set :NSCameraUsageDescription 'ZemiChat behöver kameran för att ta bilder och videosamtal'" "$PLIST"

          /usr/libexec/PlistBuddy -c "Add :NSMicrophoneUsageDescription string 'ZemiChat behöver mikrofonen för röstmeddelanden och samtal'" "$PLIST" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Set :NSMicrophoneUsageDescription 'ZemiChat behöver mikrofonen för röstmeddelanden och samtal'" "$PLIST"

          echo "Info.plist updated with privacy descriptions"
      - name: Set up code signing
        script: |
          # Generate RSA private key for certificate creation
          openssl genrsa -out /tmp/cert_key.pem 2048
          export CERTIFICATE_PRIVATE_KEY=$(cat /tmp/cert_key.pem)

          # Fetch signing files from App Store Connect (creates cert + profile if needed)
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create \
            --verbose

          # Set up keychain with fetched certificates
          keychain initialize
          keychain add-certificates

          # Patch DEVELOPMENT_TEAM in the Xcode project (Capacitor generates it empty)
          cd ios/App
          sed -i '' 's/DEVELOPMENT_TEAM = "";/DEVELOPMENT_TEAM = VVMHR5Z32V;/g' App.xcodeproj/project.pbxproj
          cd "$CM_BUILD_DIR"

          # Apply fetched profiles to Xcode project and generate export_options.plist
          # This is the KEY step: use-profiles sets CODE_SIGN_STYLE, CODE_SIGN_IDENTITY,
          # PROVISIONING_PROFILE_SPECIFIER, and DEVELOPMENT_TEAM on all targets,
          # AND generates $HOME/export_options.plist with the correct signingCertificate
          # (Apple Distribution) and signingStyle (manual) matching the installed cert.
          xcode-project use-profiles
      - name: Build IPA
        script: |
          # Debug: show what signing identities and profiles are available
          echo "=== Signing identities ==="
          security find-identity -v -p codesigning
          echo "=== Provisioning profiles ==="
          ls -la "$HOME/Library/MobileDevice/Provisioning Profiles/" || true
          echo "=== Generated export options ==="
          cat "$HOME/export_options.plist"
          echo "=== Project signing settings ==="
          xcodebuild -project "$XCODE_PROJECT" -scheme "$XCODE_SCHEME" -showBuildSettings 2>/dev/null | grep -E "(CODE_SIGN|PROVISIONING|DEVELOPMENT_TEAM)" || true

          # Use Codemagic's xcode-project build-ipa which handles both archive + export
          # in one step, using the export_options.plist generated by use-profiles.
          # This avoids the "iOS Distribution" vs "Apple Distribution" mismatch because
          # the generated plist explicitly names the correct certificate.
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME" \
            --archive-flags="-sdk iphoneos COMPILER_INDEX_STORE_ENABLE=NO" \
            --ipa-directory "$CM_BUILD_DIR/build/ios/ipa"
    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/xcarchive/*.xcarchive/**/*.log
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false

  android-release:
    name: Android Release Build
    max_build_duration: 60
    instance_type: linux_x2
    environment:
      android_signing:
        - zemichat_keystore
      vars:
        PACKAGE_NAME: "com.zemichat.app"
      node: 20
      java: 17
    scripts:
      - name: Install dependencies
        script: |
          npm ci --legacy-peer-deps
      - name: Build web assets
        script: |
          npm run build
      - name: Sync Android
        script: |
          npx cap sync android
      - name: Build AAB
        script: |
          cd android
          ./gradlew bundleRelease
    artifacts:
      - android/app/build/outputs/**/*.aab
    # publishing:
    #   google_play:
    #     credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
    #     track: internal
    #     submit_as_draft: true
