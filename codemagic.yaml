workflows:
  ios-release:
    name: iOS Release Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Bjorkhagen Ingenjorsbyra
    environment:
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        APP_STORE_CONNECT_APP_ID: "6758961616"
      node: 22
    scripts:
      - name: Install dependencies
        script: |
          npm ci --legacy-peer-deps
      - name: Build web assets
        script: |
          npm run build
      - name: Add iOS platform
        script: |
          npx cap add ios || true
          npx cap sync ios
      - name: Set up code signing
        script: |
          app-store-connect fetch-signing-files "com.zemichat.app" --type IOS_APP_STORE --create
          keychain initialize
          keychain add-certificates

          # Patch project to use our team and automatic signing
          cd ios/App
          /usr/libexec/PlistBuddy -c "Set :objects:$(xcodebuild -project App.xcodeproj -scheme App -showBuildSettings 2>/dev/null | grep -m1 'DEVELOPMENT_TEAM' | awk '{print $3}'):buildSettings:DEVELOPMENT_TEAM VVMHR5Z32V" App.xcodeproj/project.pbxproj 2>/dev/null || true

          # Use sed to set DEVELOPMENT_TEAM everywhere in project
          sed -i '' 's/DEVELOPMENT_TEAM = "";/DEVELOPMENT_TEAM = VVMHR5Z32V;/g' App.xcodeproj/project.pbxproj
          sed -i '' 's/DEVELOPMENT_TEAM = .*;/DEVELOPMENT_TEAM = VVMHR5Z32V;/g' App.xcodeproj/project.pbxproj

          # Set provisioning profile from the fetched one
          PROFILE_NAME=$(find "$HOME/Library/MobileDevice/Provisioning Profiles" -name "*.mobileprovision" -exec /usr/libexec/PlistBuddy -c 'Print :Name' /dev/stdin \; 2>/dev/null | head -1)
          echo "Using profile: $PROFILE_NAME"

          if [ -n "$PROFILE_NAME" ]; then
            sed -i '' "s/PROVISIONING_PROFILE_SPECIFIER = \"\";/PROVISIONING_PROFILE_SPECIFIER = \"$PROFILE_NAME\";/g" App.xcodeproj/project.pbxproj
            sed -i '' "s/PROVISIONING_PROFILE_SPECIFIER = .*;/PROVISIONING_PROFILE_SPECIFIER = \"$PROFILE_NAME\";/g" App.xcodeproj/project.pbxproj
          fi

          cd "$CM_BUILD_DIR"
          xcode-project use-profiles
      - name: Build IPA
        script: |
          # Find the provisioning profile name
          PROFILE_NAME=$(cd "$HOME/Library/MobileDevice/Provisioning Profiles" && for f in *.mobileprovision; do /usr/libexec/PlistBuddy -c 'Print :Name' /dev/stdin < "$f" 2>/dev/null; done | head -1)
          PROFILE_UUID=$(cd "$HOME/Library/MobileDevice/Provisioning Profiles" && ls *.mobileprovision | head -1 | sed 's/.mobileprovision//')
          echo "Profile name: $PROFILE_NAME"
          echo "Profile UUID: $PROFILE_UUID"

          # List available signing identities
          security find-identity -v -p codesigning

          # Build archive with explicit team and signing
          xcodebuild archive \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -sdk iphoneos \
            -configuration Release \
            -archivePath "$CM_BUILD_DIR/build/ios/App.xcarchive" \
            COMPILER_INDEX_STORE_ENABLE=NO \
            DEVELOPMENT_TEAM=VVMHR5Z32V \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME" \
            CODE_SIGNING_REQUIRED=YES \
            CODE_SIGNING_ALLOWED=YES \
            -allowProvisioningUpdates

          # Export IPA
          xcodebuild -exportArchive \
            -archivePath "$CM_BUILD_DIR/build/ios/App.xcarchive" \
            -exportPath "$CM_BUILD_DIR/build/ios/ipa" \
            -exportOptionsPlist "$CM_BUILD_DIR/ExportOptions.plist"
    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/App.xcarchive/**/*.log
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false

  android-release:
    name: Android Release Build
    max_build_duration: 60
    instance_type: linux_x2
    environment:
      android_signing:
        - zemichat_keystore
      vars:
        PACKAGE_NAME: "com.zemichat.app"
      node: 20
      java: 17
    scripts:
      - name: Install dependencies
        script: |
          npm ci --legacy-peer-deps
      - name: Build web assets
        script: |
          npm run build
      - name: Sync Android
        script: |
          npx cap sync android
      - name: Build AAB
        script: |
          cd android
          ./gradlew bundleRelease
    artifacts:
      - android/app/build/outputs/**/*.aab
    # publishing:
    #   google_play:
    #     credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
    #     track: internal
    #     submit_as_draft: true
