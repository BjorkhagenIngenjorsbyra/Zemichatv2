workflows:
  ios-release:
    name: iOS Release Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Bjorkhagen Ingenjorsbyra
    environment:
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        APP_STORE_CONNECT_APP_ID: "6758961616"
      node: 22
    scripts:
      - name: Install dependencies
        script: |
          npm ci --legacy-peer-deps
      - name: Build web assets
        script: |
          npm run build
      - name: Add iOS platform
        script: |
          npx cap add ios || true
          npx cap sync ios
      - name: Set up code signing
        script: |
          app-store-connect fetch-signing-files "com.zemichat.app" --type IOS_APP_STORE --create
          keychain initialize
          keychain add-certificates

          # Patch project to use our team and automatic signing
          cd ios/App
          /usr/libexec/PlistBuddy -c "Set :objects:$(xcodebuild -project App.xcodeproj -scheme App -showBuildSettings 2>/dev/null | grep -m1 'DEVELOPMENT_TEAM' | awk '{print $3}'):buildSettings:DEVELOPMENT_TEAM VVMHR5Z32V" App.xcodeproj/project.pbxproj 2>/dev/null || true

          # Use sed to set DEVELOPMENT_TEAM everywhere in project
          sed -i '' 's/DEVELOPMENT_TEAM = "";/DEVELOPMENT_TEAM = VVMHR5Z32V;/g' App.xcodeproj/project.pbxproj
          sed -i '' 's/DEVELOPMENT_TEAM = .*;/DEVELOPMENT_TEAM = VVMHR5Z32V;/g' App.xcodeproj/project.pbxproj

          # Set provisioning profile from the fetched one
          PROFILE_NAME=$(find "$HOME/Library/MobileDevice/Provisioning Profiles" -name "*.mobileprovision" -exec /usr/libexec/PlistBuddy -c 'Print :Name' /dev/stdin \; 2>/dev/null | head -1)
          echo "Using profile: $PROFILE_NAME"

          if [ -n "$PROFILE_NAME" ]; then
            sed -i '' "s/PROVISIONING_PROFILE_SPECIFIER = \"\";/PROVISIONING_PROFILE_SPECIFIER = \"$PROFILE_NAME\";/g" App.xcodeproj/project.pbxproj
            sed -i '' "s/PROVISIONING_PROFILE_SPECIFIER = .*;/PROVISIONING_PROFILE_SPECIFIER = \"$PROFILE_NAME\";/g" App.xcodeproj/project.pbxproj
          fi

          cd "$CM_BUILD_DIR"
          xcode-project use-profiles
      - name: Build IPA
        script: |
          # Find the provisioning profile name
          PROFILE_NAME=$(cd "$HOME/Library/MobileDevice/Provisioning Profiles" && for f in *.mobileprovision; do /usr/libexec/PlistBuddy -c 'Print :Name' /dev/stdin < "$f" 2>/dev/null; done | head -1)
          PROFILE_UUID=$(cd "$HOME/Library/MobileDevice/Provisioning Profiles" && ls *.mobileprovision | head -1 | sed 's/.mobileprovision//')
          echo "Profile name: $PROFILE_NAME"
          echo "Profile UUID: $PROFILE_UUID"

          # List available signing identities
          security find-identity -v -p codesigning

          # Get the signing identity hash
          CERT_SHA=$(security find-identity -v -p codesigning | grep "Apple Distribution" | head -1 | awk '{print $2}')
          echo "Using certificate: $CERT_SHA"

          # Build archive with cert hash (avoids iOS Distribution vs Apple Distribution mismatch)
          xcodebuild archive \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -sdk iphoneos \
            -configuration Release \
            -archivePath "$CM_BUILD_DIR/build/ios/App.xcarchive" \
            COMPILER_INDEX_STORE_ENABLE=NO \
            DEVELOPMENT_TEAM=VVMHR5Z32V \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="$CERT_SHA" \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME" \
            -allowProvisioningUpdates

          # Embed provisioning profile into .app
          APP_PATH="$CM_BUILD_DIR/build/ios/App.xcarchive/Products/Applications/App.app"
          PROFILE_FILE=$(ls "$HOME/Library/MobileDevice/Provisioning Profiles"/*.mobileprovision 2>/dev/null | head -1)
          echo "Embedding profile: $PROFILE_FILE"
          cp "$PROFILE_FILE" "$APP_PATH/embedded.mobileprovision"

          # Re-sign the app with the profile embedded
          /usr/bin/codesign --force --sign "$CERT_SHA" --entitlements "$CM_BUILD_DIR/build/ios/App.xcarchive/Products/Applications/App.app/../../../*.xcent" "$APP_PATH" 2>/dev/null || \
          /usr/bin/codesign --force --sign "$CERT_SHA" "$APP_PATH"

          # Create IPA from archive
          IPA_DIR="$CM_BUILD_DIR/build/ios/ipa"
          mkdir -p "$IPA_DIR/Payload"
          cp -r "$APP_PATH" "$IPA_DIR/Payload/"
          cd "$IPA_DIR" && zip -r "$IPA_DIR/App.ipa" Payload
          echo "IPA created at $IPA_DIR/App.ipa"

          # Verify embedded.mobileprovision
          ls -la "$IPA_DIR/Payload/App.app/embedded.mobileprovision"

          # Upload to App Store Connect
          app-store-connect publish --path "$IPA_DIR/App.ipa"
    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/App.xcarchive/**/*.log
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false

  android-release:
    name: Android Release Build
    max_build_duration: 60
    instance_type: linux_x2
    environment:
      android_signing:
        - zemichat_keystore
      vars:
        PACKAGE_NAME: "com.zemichat.app"
      node: 20
      java: 17
    scripts:
      - name: Install dependencies
        script: |
          npm ci --legacy-peer-deps
      - name: Build web assets
        script: |
          npm run build
      - name: Sync Android
        script: |
          npx cap sync android
      - name: Build AAB
        script: |
          cd android
          ./gradlew bundleRelease
    artifacts:
      - android/app/build/outputs/**/*.aab
    # publishing:
    #   google_play:
    #     credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
    #     track: internal
    #     submit_as_draft: true
